<!DOCTYPE html>
<html lang="zh-CN">
<!-- html标签：网页的根标签，lang="zh-CN"表示中文网页 -->
<head>
    <!-- head标签：存放网页的元信息，不会显示在页面上 -->
    <meta charset="UTF-8">
    <!-- charset="UTF-8"：设置字符编码为UTF-8，支持中文显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- viewport：设置页面适应移动端设备 -->
    <title>贪吃蛇游戏</title>
    <!-- title标签：网页标题，显示在浏览器标签上 -->
    
    <style>
        /* style标签：存放CSS样式代码 */
        
        /* body选择器：设置整个页面的样式 */
        body {
            display: flex;           /* 使用flex布局 */
            flex-direction: column;  /* 子元素垂直排列 */
            align-items: center;     /* 子元素水平居中 */
            background-color: #f0f0f0;  /* 页面背景色为浅灰色 */
            font-family: Arial, sans-serif;  /* 设置字体 */
        }
        
        /* #gameCanvas选择器：设置画布样式 */
        #gameCanvas {
            border: 4px solid #333;   /* 4像素的黑色边框 */
            background-color: #fff;   /* 画布背景为白色 */
        }
        
        /* #score选择器：设置分数显示样式 */
        #score {
            font-size: 24px;      /* 字体大小24像素 */
            font-weight: bold;    /* 粗体字 */
            margin-bottom: 10px;  /* 底部外边距10像素 */
        }
        
        /* 方向键容器样式 */
        #controls {
            display: flex;               /* 使用flex布局 */
            flex-direction: column;      /* 子元素垂直排列 */
            align-items: center;         /* 水平居中 */
            margin-top: 20px;            /* 顶部外边距20像素 */
        }
        
        /* 方向键按钮样式 */
        .direction-btn {
            width: 60px;                 /* 按钮宽度60像素 */
            height: 60px;                /* 按钮高度60像素 */
            font-size: 24px;             /* 字体大小24像素 */
            font-weight: bold;           /* 粗体字 */
            background-color: #4CAF50;   /* 绿色背景 */
            color: white;                /* 白色文字 */
            border: none;                /* 无边框 */
            border-radius: 10px;         /* 圆角10像素 */
            margin: 5px;                 /* 外边距5像素 */
            cursor: pointer;             /* 鼠标指针变为手型 */
            outline: none;               /* 移除点击时的焦点边框 */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);  /* 添加阴影效果 */
            user-select: none;           /* 禁止选中文字 */
            -webkit-tap-highlight-color: transparent;  /* 移除移动端点击高亮 */
        }
        
        /* 按钮点击/触摸时的样式 */
        .direction-btn:active {
            background-color: #45a049;  /* 点击时颜色变深 */
            box-shadow: 0 2px 3px rgba(0, 0, 0, 0.3);  /* 阴影变小 */
            transform: translateY(2px);  /* 向下移动2像素，模拟按下效果 */
        }
        
        /* 方向键行容器 */
        .controls-row {
            display: flex;  /* 使用flex布局，子元素水平排列 */
        }
        
        /* 左、右按钮的外边距 */
        #btn-left, #btn-right {
            margin: 0 10px;  /* 左右外边距10像素 */
        }
    </style>
</head>
<body>
    <!-- body标签：存放网页的主要内容 -->
    
    <!-- div标签：显示分数 -->
    <div id="score">分数: 0</div>
    
    <!-- canvas标签：游戏画布，400x400像素 -->
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <!-- 虚拟方向键控制区 -->
    <div id="controls">
        <!-- 上方向键 -->
        <div class="controls-row">
            <button id="btn-up" class="direction-btn">↑</button>
        </div>
        <!-- 左、下、右方向键 -->
        <div class="controls-row">
            <button id="btn-left" class="direction-btn">←</button>
            <button id="btn-down" class="direction-btn">↓</button>
            <button id="btn-right" class="direction-btn">→</button>
        </div>
    </div>

    <script>
        // script标签：存放JavaScript代码
        
        // ==================== 游戏配置 ====================
        // 使用const声明常量，值不能改变
        
        // 每个格子的大小（像素）
        const GRID_SIZE = 20;
        // 画布上有多少个格子（20x20）
        const GRID_COUNT = 20;
        // 游戏速度（毫秒），数字越小速度越快
        const GAME_SPEED = 150;
        
        // ==================== 获取页面元素 ====================
        
        // 获取canvas画布元素，赋值给变量canvas
        const canvas = document.getElementById('gameCanvas');
        // 获取画布的2D绘图上下文，用于绘制图形
        const ctx = canvas.getContext('2d');
        // 获取显示分数的div元素
        const scoreElement = document.getElementById('score');
        
        // ==================== 游戏状态变量 ====================
        // 使用let声明变量，值可以改变
        
        // 蛇的身体，是一个数组，每个元素是{x, y}坐标对象
        let snake = [
            { x: 10, y: 10 }  // 初始位置在画布中心（第10行第10列）
        ];
        // 蛇的移动方向，初始向右
        let direction = 'right';
        // 食物的位置，初始在(15, 10)
        let food = { x: 15, y: 10 };
        // 当前分数，初始为0
        let score = 0;
        // 游戏是否结束，初始为false（未结束）
        let gameOver = false;
        // 游戏循环定时器，初始为null
        let gameLoop = null;
        
        // ==================== 绘制函数 ====================
        
        /**
         * 绘制蛇的函数
         */
        function drawSnake() {
            // 使用forEach遍历蛇的每一段身体
            // segment是当前身体段，index是它的索引（从0开始）
            snake.forEach((segment, index) => {
                // 设置填充颜色
                if (index === 0) {
                    // 索引0是蛇头，用深绿色
                    ctx.fillStyle = '#2d5a27';
                } else {
                    // 其他是蛇身，用浅绿色
                    ctx.fillStyle = '#4a7c59';
                }
                
                // 绘制一个矩形作为蛇的身体段
                ctx.fillRect(
                    segment.x * GRID_SIZE,  // x坐标：格子号 * 格子大小
                    segment.y * GRID_SIZE,  // y坐标：格子号 * 格子大小
                    GRID_SIZE - 1,          // 宽度：格子大小-1（留缝隙）
                    GRID_SIZE - 1           // 高度：格子大小-1
                );
            });
        }
        
        /**
         * 绘制食物的函数
         */
        function drawFood() {
            // 设置食物颜色为红色
            ctx.fillStyle = '#ff4444';
            
            // 开始绘制路径（准备画圆形）
            ctx.beginPath();
            
            // 计算圆心位置：在格子中心
            const centerX = food.x * GRID_SIZE + GRID_SIZE / 2;
            const centerY = food.y * GRID_SIZE + GRID_SIZE / 2;
            
            // 绘制圆形：arc(圆心x, 圆心y, 半径, 起始角度, 结束角度)
            ctx.arc(centerX, centerY, GRID_SIZE / 2 - 2, 0, Math.PI * 2);
            
            // 填充颜色
            ctx.fill();
        }
        
        /**
         * 绘制游戏结束画面的函数
         */
        function drawGameOver() {
            // 设置半透明黑色背景（rgba：红,绿,蓝,透明度）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            // 填充整个画布
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 设置文字颜色为白色
            ctx.fillStyle = '#fff';
            // 设置字体大小和类型
            ctx.font = '36px Arial';
            // 设置文字居中对齐
            ctx.textAlign = 'center';
            
            // 绘制"游戏结束"文字，位置在画布中间偏上
            ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 20);
            
            // 改变字体大小
            ctx.font = '24px Arial';
            // 绘制最终分数，位置在画布中间
            ctx.fillText(`最终分数: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
            
            // 改变字体大小
            ctx.font = '18px Arial';
            // 绘制提示文字，位置在画布中间偏下
            ctx.fillText('按空格键重新开始', canvas.width / 2, canvas.height / 2 + 60);
        }
        
        /**
         * 清空画布并绘制网格的函数
         */
        function clearCanvas() {
            // 设置填充颜色为白色
            ctx.fillStyle = '#fff';
            // 填充整个画布（清空之前的内容）
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 设置网格线颜色为浅灰色
            ctx.strokeStyle = '#eee';
            // 设置网格线宽度为0.5像素
            ctx.lineWidth = 0.5;
            
            // 循环绘制网格线
            for (let i = 0; i <= GRID_COUNT; i++) {
                // 绘制垂直线
                ctx.beginPath();                    // 开始路径
                ctx.moveTo(i * GRID_SIZE, 0);      // 起点：(i*格子大小, 0)
                ctx.lineTo(i * GRID_SIZE, canvas.height);  // 终点：(i*格子大小, 画布高度)
                ctx.stroke();                       // 绘制线条
                
                // 绘制水平线
                ctx.beginPath();                    // 开始路径
                ctx.moveTo(0, i * GRID_SIZE);      // 起点：(0, i*格子大小)
                ctx.lineTo(canvas.width, i * GRID_SIZE);  // 终点：(画布宽度, i*格子大小)
                ctx.stroke();                       // 绘制线条
            }
        }
        
        // ==================== 游戏逻辑函数 ====================
        
        /**
         * 移动蛇的函数
         */
        function moveSnake() {
            // 如果游戏结束，直接返回，不执行移动
            if (gameOver) return;
            
            // 复制当前蛇头的位置（使用展开运算符...）
            const head = { ...snake[0] };
            
            // 根据方向移动蛇头
            switch (direction) {
                case 'up':
                    head.y--;  // 向上移动：y坐标减1
                    break;
                case 'down':
                    head.y++;  // 向下移动：y坐标加1
                    break;
                case 'left':
                    head.x--;  // 向左移动：x坐标减1
                    break;
                case 'right':
                    head.x++;  // 向右移动：x坐标加1
                    break;
            }
            
            // 将新蛇头添加到蛇身体的最前面（unshift：数组开头添加元素）
            snake.unshift(head);
            
            // 检查是否吃到食物（蛇头位置等于食物位置）
            if (head.x === food.x && head.y === food.y) {
                // 吃到食物：增加10分
                score += 10;
                // 更新页面上的分数显示
                scoreElement.textContent = `分数: ${score}`;
                // 生成新的食物位置
                spawnFood();
            } else {
                // 没吃到食物：移除蛇尾（pop：删除数组最后一个元素）
                snake.pop();
            }
            
            // 检查是否发生碰撞
            checkCollision();
        }
        
        /**
         * 在随机位置生成食物的函数
         */
        function spawnFood() {
            // 声明变量存储新食物位置
            let newFood;
            
            // do-while循环：先执行一次，再判断条件
            do {
                // 生成随机位置
                newFood = {
                    // Math.random()生成0-1的随机数，乘以格子数后取整
                    x: Math.floor(Math.random() * GRID_COUNT),
                    y: Math.floor(Math.random() * GRID_COUNT)
                };
            // 条件：新食物位置不能在蛇身上
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            
            // 将新位置赋值给food变量
            food = newFood;
        }
        
        /**
         * 检查碰撞的函数（撞墙或撞自己）
         */
        function checkCollision() {
            // 获取蛇头
            const head = snake[0];
            
            // 检查是否撞到墙壁
            if (
                head.x < 0 ||                          // 撞左墙
                head.x >= GRID_COUNT ||                // 撞右墙
                head.y < 0 ||                          // 撞上墙
                head.y >= GRID_COUNT                   // 撞下墙
            ) {
                // 调用结束游戏函数
                endGame();
                return;  // 退出函数
            }
            
            // 检查是否撞到自己的身体（从索引1开始，因为索引0是蛇头）
            for (let i = 1; i < snake.length; i++) {
                // 如果蛇头坐标等于某段身体的坐标
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    // 调用结束游戏函数
                    endGame();
                    return;  // 退出函数
                }
            }
        }
        
        /**
         * 结束游戏的函数
         */
        function endGame() {
            // 将游戏结束标志设为true
            gameOver = true;
            
            // 如果定时器存在，停止定时器
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
        }
        
        /**
         * 重新开始游戏的函数
         */
        function restartGame() {
            // 重置蛇的位置到中心
            snake = [{ x: 10, y: 10 }];
            // 重置方向为向右
            direction = 'right';
            // 重置分数为0
            score = 0;
            // 更新页面分数显示
            scoreElement.textContent = `分数: ${score}`;
            // 重置游戏结束标志为false
            gameOver = false;
            
            // 生成新的食物
            spawnFood();
            
            // 重新开始游戏循环
            gameLoop = setInterval(() => {
                moveSnake();   // 移动蛇
                updateGame();  // 更新画面
            }, GAME_SPEED);    // 每隔GAME_SPEED毫秒执行一次
        }
        
        /**
         * 更新游戏画面的函数
         */
        function updateGame() {
            // 清空画布
            clearCanvas();
            
            // 绘制食物
            drawFood();
            
            // 绘制蛇
            drawSnake();
            
            // 如果游戏结束，绘制结束画面
            if (gameOver) {
                drawGameOver();
            }
        }
        
        // ==================== 键盘控制 ====================
        
        /**
         * 处理键盘输入的函数
         */
        function handleKeyDown(event) {
            // 获取按下的按键
            const key = event.key;
            
            // 方向控制：防止180度转向
            if (key === 'ArrowUp' && direction !== 'down') {
                // 按上键，且当前方向不是向下
                direction = 'up';
            } else if (key === 'ArrowDown' && direction !== 'up') {
                // 按下键，且当前方向不是向上
                direction = 'down';
            } else if (key === 'ArrowLeft' && direction !== 'right') {
                // 按左键，且当前方向不是向右
                direction = 'left';
            } else if (key === 'ArrowRight' && direction !== 'left') {
                // 按右键，且当前方向不是向左
                direction = 'right';
            }
            
            // 空格键重新开始游戏（只有游戏结束时有效）
            if (key === ' ' && gameOver) {
                restartGame();
            }
        }
        
        // ==================== 启动游戏 ====================
        
        // 添加键盘事件监听：当按下键盘时调用handleKeyDown函数
        document.addEventListener('keydown', handleKeyDown);
        
        // ==================== 虚拟按钮控制 ====================
        
        // 获取虚拟方向键按钮元素
        const btnUp = document.getElementById('btn-up');
        const btnDown = document.getElementById('btn-down');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        
        // 上方向键点击事件
        btnUp.addEventListener('click', function() {
            // 只有当前方向不是向下时才能向上
            if (direction !== 'down') {
                direction = 'up';
            }
        });
        
        // 下方向键点击事件
        btnDown.addEventListener('click', function() {
            // 只有当前方向不是向上时才能向下
            if (direction !== 'up') {
                direction = 'down';
            }
        });
        
        // 左方向键点击事件
        btnLeft.addEventListener('click', function() {
            // 只有当前方向不是向右时才能向左
            if (direction !== 'right') {
                direction = 'left';
            }
        });
        
        // 右方向键点击事件
        btnRight.addEventListener('click', function() {
            // 只有当前方向不是向左时才能向右
            if (direction !== 'left') {
                direction = 'right';
            }
        });
        
        // 开始游戏循环
        // setInterval：每隔GAME_SPEED毫秒执行一次回调函数
        gameLoop = setInterval(() => {
            moveSnake();   // 移动蛇
            updateGame();  // 更新画面
        }, GAME_SPEED);
        
        // 初始化绘制一次画面（避免开始时画面空白）
        updateGame();
    </script>
</body>
</html>
